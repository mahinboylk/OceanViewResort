name: Java CI with Maven

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build with Maven
      run: mvn -f OceanViewResort/pom.xml clean compile
    
    - name: Run tests
      run: mvn -f OceanViewResort/pom.xml test
    
    - name: Package
      run: mvn -f OceanViewResort/pom.xml package -DskipTests
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: OceanViewResort/target/*.war
